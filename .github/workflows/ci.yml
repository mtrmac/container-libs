name: ci

on:
  push:
    branches:
      - main
      - podman-*
  pull_request:
    branches:
      - main
      - podman-*

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  path-filter:
    runs-on: ubuntu-24.04
    outputs:
      storage: ${{ steps.filter.outputs.storage }}
      image: ${{ steps.filter.outputs.image }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            storage:
              - '.github/workflows/ci.yml'
              - 'hack/ci/**'
              - 'go.work'
              - 'go.work.sum'
              - 'storage/**'
            image:
              - '.github/workflows/ci.yml'
              - 'hack/ci/**'
              - 'go.work'
              - 'go.work.sum'
              - 'storage/**'
              - 'image/**'

  storage-test:
    needs: path-filter
    if: github.event_name == 'push' || needs.path-filter.outputs.storage == 'true'
    name: "storage ${{ matrix.distro }} ${{ matrix.driver }}"
    strategy:
      fail-fast: false
      matrix:
        distro: [fedora-current, debian-sid]
        driver: [vfs, overlay, overlay-transient, fuse-overlay, fuse-overlay-whiteout, btrfs]
        exclude:
          - distro: debian-sid
            driver: overlay-transient
    uses: ./.github/workflows/lima.yml
    with:
      runner: cncf-ubuntu-8-32-x86
      module: storage
      distro: ${{ matrix.distro }}
      variant: ${{ matrix.driver }}
      timeout: 30

  storage-cross:
    needs: path-filter
    if: github.event_name == 'push' || needs.path-filter.outputs.storage == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    name: "Storage: Cross"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable
          cache-dependency-path: "./storage/go.sum"
      - name: Cross-compile
        working-directory: ./storage
        run: make cross

  image-cross:
    needs: path-filter
    if: github.event_name == 'push' || needs.path-filter.outputs.image == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    name: "Image: Cross"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable
          cache-dependency-path: "./image/go.sum"
      - name: Install dependencies
        run: |
          sudo apt-get -qq update
          sudo apt-get -qq install -y libgpgme-dev libassuan-dev libbtrfs-dev libdevmapper-dev
      - name: Cross-compile
        working-directory: ./image
        run: make cross

  image-test:
    needs: path-filter
    if: github.event_name == 'push' || needs.path-filter.outputs.image == 'true'
    name: "${{ matrix.module }} fedora-current ${{ matrix.variant }}"
    strategy:
      fail-fast: false
      matrix:
        variant: [default, openpgp, sequoia]
        module: [image, image-skopeo]
    uses: ./.github/workflows/lima.yml
    with:
      runner: cncf-ubuntu-8-32-x86
      module: ${{ matrix.module }}
      distro: fedora-current
      variant: ${{ matrix.variant }}
      timeout: 30

  common-test:
    name: "common fedora-current"
    uses: ./.github/workflows/lima.yml
    with:
      runner: cncf-ubuntu-8-32-x86
      module: common
      distro: fedora-current
      timeout: 45

  # N/B: GitHub merge protection is configured for this exact job name, DO NOT CHANGE IT.
  success:
    name: "Total Success"
    if: always()
    needs:
      - storage-test
      - storage-cross
      - image-cross
      - image-test
      - common-test
    runs-on: ubuntu-24.04
    steps:
      - name: Check all required jobs
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]] || \
             [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled"
            exit 1
          fi
          echo "All required jobs passed or were skipped"
